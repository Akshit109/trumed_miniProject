<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruMed - AI Healthcare</title>
<link rel="icon" href="{{ url_for('static', filename='images/dev2.png') }}">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    color:#111;
}

/* NAVBAR */
.navbar{
    width:100%;
    padding:22px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #f1f1f1;
    background:#fff;
}

.logo img{
    height:55px;
}

.nav-right{
    display:flex;
    gap:15px;
}

.btn-outline{
    padding:12px 28px;
    border:2px solid #ef4444;
    border-radius:40px;
    color:#ef4444;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.btn-outline:hover{
    background:#ef4444;
    color:#fff;
}

.btn-fill{
    padding:12px 28px;
    border-radius:40px;
    background:#ef4444;
    color:#fff;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.btn-fill:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(239,68,68,.25);
}

/* HERO */
.hero{
    width:90%;
    max-width:1400px;
    margin:auto;
    min-height:88vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:50px;
}

.left h1{
    font-size:72px;
    line-height:1.05;
    font-weight:900;
    margin-bottom:20px;
}

.left h1 span{
    color:#ef4444;
}

.left p{
    font-size:24px;
    line-height:1.8;
    color:#555;
    max-width:620px;
    margin-bottom:35px;
}

.hero-btns{
    display:flex;
    gap:18px;
    margin-bottom:28px;
}

.hero-btn{
    padding:18px 34px;
    border-radius:45px;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
}

.primary{
    background:#ef4444;
    color:#fff;
}

.secondary{
    border:2px solid #ef4444;
    color:#ef4444;
}

.primary:hover,
.secondary:hover{
    transform:translateY(-3px);
}

.trust{
    display:flex;
    align-items:center;
    gap:18px;
    margin-top:15px;
}

.trust img{
    width:120px;
}

.trust p{
    font-size:16px;
    color:#666;
    margin:0;
}

.trust span{
    color:#ef4444;
    font-weight:800;
}

/* RIGHT IMAGE */
.right{
    display:flex;
    justify-content:center;
}

.image-box{
    width:620px;
    height:620px;
    border-radius:35px;
    background:#fff5f5;
    box-shadow:0 25px 60px rgba(239,68,68,.08);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:20px;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* RESPONSIVE */
@media(max-width:1100px){

.hero{
    grid-template-columns:1fr;
    padding:40px 0;
    text-align:center;
}

.left p{
    margin:auto;
    margin-bottom:30px;
}

.hero-btns,
.trust{
    justify-content:center;
}

.left h1{
    font-size:52px;
}

.image-box{
    width:100%;
    max-width:520px;
    height:520px;
}

}

@media(max-width:700px){

.navbar{
    padding:18px 20px;
}

.logo img{
    height:42px;
}

.btn-fill,
.btn-outline{
    padding:10px 18px;
    font-size:14px;
}

.left h1{
    font-size:40px;
}

.left p{
    font-size:18px;
}

.hero-btn{
    padding:14px 20px;
    font-size:15px;
}

.image-box{
    height:380px;
}

}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/" class="logo">
        <img src="{{ url_for('static', filename='images/dev2.png') }}">
    </a>

    <div class="nav-right">
        <a href="{{ url_for('login') }}" class="btn-outline">Login</a>
        <a href="{{ url_for('signup') }}" class="btn-fill">Sign Up</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">

    <div class="left">
        <h1>
            AI-Powered <br>
            <span>Disease Risk</span><br>
            <span>Prediction</span>
        </h1>

        <p>
            Get instant, explainable health insights using advanced
            artificial intelligence. Understand your health better with
            our state-of-the-art ML models.
        </p>

        <div class="hero-btns">
            <a href="{{ url_for('signup') }}" class="hero-btn primary">🚀 Get Started Free</a>
            <a href="{{ url_for('login') }}" class="hero-btn secondary">▶ Learn More</a>
        </div>

        <div class="trust">
            <img src="https://i.imgur.com/QM8Q7uG.png">
            <p>Trusted by <span>10,000+</span> users</p>
        </div>
    </div>

    <div class="right">
        <div class="image-box">
          <img src="{{ url_for('static', filename='images/robot.png') }}">
        </div>
    </div>

</section>

</body>
</html>
