<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruMed - Premium Prediction</title>
<link rel="icon" href="{{ url_for('static', filename='images/dev2.png') }}">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

:root{
--primary:#ef4444;
--dark:#dc2626;
--soft:#fff5f5;
--border:#f3d6d6;
--text:#111827;
--muted:#6b7280;
}

body{
background:linear-gradient(135deg,#fff5f5,#ffffff,#ffe4e6);
color:var(--text);
min-height:100vh;
}

/* NAVBAR */
.navbar{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,.92);
backdrop-filter:blur(12px);
border-bottom:1px solid #f3f4f6;
box-shadow:0 8px 24px rgba(0,0,0,.05);
}

.nav-container{
max-width:1400px;
margin:auto;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

.logo img{
height:52px;
}

.nav-links{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.nav-links a{
text-decoration:none;
padding:10px 18px;
border-radius:28px;
font-weight:700;
color:var(--primary);
transition:.25s;
}

.nav-links a:hover,
.nav-links a.active{
background:var(--primary);
color:#fff;
}

.btn-logout{
border:2px solid var(--primary);
}

/* HEADER */
.container{
max-width:1400px;
margin:auto;
padding:28px 24px;
}

.prediction-header{
text-align:center;
margin-bottom:26px;
}

.prediction-header h1{
font-size:46px;
margin-bottom:8px;
}

.prediction-header p{
font-size:18px;
color:var(--muted);
}

/* GRID */
.prediction-form{
display:grid;
grid-template-columns:1.45fr .72fr;
gap:28px;
align-items:start;
}

/* LEFT PANEL */
.left-panel{
background:rgba(255,255,255,.92);
border:1px solid rgba(255,255,255,.8);
border-radius:24px;
padding:24px;
box-shadow:0 20px 45px rgba(0,0,0,.06);
backdrop-filter:blur(10px);
}

/* RIGHT PANEL */
.right-panel{
position:sticky;
top:100px;
background:rgba(255,255,255,.95);
border-radius:24px;
padding:24px;
box-shadow:0 20px 45px rgba(0,0,0,.08);
border:1px solid rgba(255,255,255,.8);
}

/* LIVE CARD */
.live-box{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:#fff;
border-radius:22px;
padding:22px;
margin-bottom:18px;
}

.big-count{
font-size:56px;
font-weight:900;
line-height:1;
margin-bottom:8px;
}

.mini{
font-size:14px;
opacity:.95;
}

.ready-meter{
height:10px;
margin-top:14px;
background:rgba(255,255,255,.22);
border-radius:20px;
overflow:hidden;
}

.ready-fill{
height:100%;
width:0%;
background:#fff;
transition:.3s;
}

/* SEARCH */
.filter-section{
margin-bottom:22px;
}

.search-box{
width:100%;
padding:16px;
border:2px solid #f2d8d8;
border-radius:16px;
font-size:16px;
outline:none;
}

.search-box:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(239,68,68,.08);
}

.category-filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:14px;
}

.filter-btn{
padding:10px 16px;
border-radius:26px;
border:1px solid #f0cccc;
background:#fff;
color:var(--primary);
font-weight:700;
cursor:pointer;
}

.filter-btn:hover,
.filter-btn.active{
background:var(--primary);
color:#fff;
}

.filter-btn.all{
background:var(--primary);
color:#fff;
border:none;
}

/* ACCORDION */
.category-section{
margin-bottom:14px;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 22px rgba(0,0,0,.04);
}

.category-header{
padding:18px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.category-section.expanded .category-header{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:#fff;
}

.category-title{
display:flex;
gap:12px;
align-items:center;
font-weight:800;
}

.category-info{
display:flex;
gap:8px;
align-items:center;
}

.category-count,
.category-selected{
padding:6px 10px;
border-radius:20px;
font-size:12px;
font-weight:800;
}

.category-count{
background:#fff5f5;
color:var(--primary);
}

.category-selected{
background:#16a34a;
color:#fff;
}

.toggle-icon{
font-size:14px;
}

.category-content{
display:none;
}

.category-section.expanded .category-content{
display:block;
}

.symptoms-grid{
padding:16px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:12px;
background:#fffaf9;
}

.symptom-checkbox{
display:flex;
gap:10px;
align-items:center;
padding:14px;
border:1px solid #f1dada;
border-radius:14px;
background:#fff;
cursor:pointer;
transition:.2s;
}

.symptom-checkbox:hover{
transform:translateY(-2px);
border-color:var(--primary);
background:#fff5f5;
}

.symptom-checkbox.selected{
background:#ecfdf3;
border-color:#16a34a;
}

.symptom-checkbox input{
accent-color:var(--primary);
}

/* SUMMARY */
.selected-summary{
display:block;
background:#fff;
border:1px solid #f2e2e2;
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

.selected-summary h3{
margin-bottom:12px;
}

.selected-tags{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.symptom-tag{
padding:8px 12px;
border-radius:20px;
background:#fff5f5;
border:1px solid #ffd4d4;
font-size:13px;
display:flex;
gap:8px;
align-items:center;
}

.remove-tag{
cursor:pointer;
font-weight:900;
color:var(--dark);
}

/* TEXTAREA */
.custom-issue-section h2{
font-size:18px;
margin-bottom:10px;
margin-top:8px;
}

.custom-issue-section textarea{
width:100%;
min-height:120px;
padding:16px;
border:2px solid #f2d8d8;
border-radius:16px;
resize:vertical;
outline:none;
}

.custom-issue-section textarea:focus{
border-color:var(--primary);
}

/* ACTIONS */
.form-actions{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

.btn-submit,
.btn-reset{
padding:16px;
border:none;
border-radius:16px;
font-weight:800;
font-size:16px;
cursor:pointer;
}

.btn-submit{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:#fff;
}

.btn-submit:hover:not(:disabled){
transform:translateY(-2px);
box-shadow:0 16px 28px rgba(239,68,68,.25);
}

.btn-submit:disabled{
opacity:.55;
cursor:not-allowed;
}

.btn-reset{
background:#fff;
color:var(--primary);
border:2px solid var(--primary);
}

/* ERROR */
.error-message{
display:none;
padding:14px;
border-radius:14px;
background:#fef2f2;
color:#991b1b;
margin-bottom:14px;
}

.error-message.active{
display:block;
}

/* LOADING */
.loading-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:3000;
justify-content:center;
align-items:center;
}

.loading-overlay.active{
display:flex;
}

.loading-content{
background:#fff;
padding:30px;
border-radius:24px;
text-align:center;
min-width:280px;
}

.spinner{
width:54px;
height:54px;
border:4px solid #f3f4f6;
border-top:4px solid var(--primary);
border-radius:50%;
margin:0 auto 14px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:1050px){
.prediction-form{
grid-template-columns:1fr;
}
.right-panel{
position:static;
}
}

@media(max-width:700px){
.prediction-header h1{font-size:34px;}
.symptoms-grid{grid-template-columns:1fr;}
.nav-container{flex-direction:column;}
}
</style>
</head>
<body>

<nav class="navbar">
<div class="nav-container">
<a href="{{ url_for('dashboard') }}" class="logo">
<img src="{{ url_for('static', filename='images/dev2.png') }}">
</a>

<div class="nav-links">
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('prediction') }}" class="active">Prediction</a>
<a href="{{ url_for('history') }}">History</a>
<a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
</div>
</div>
</nav>

<div class="container">

<div class="prediction-header">
<h1>🩺 Health Assessment</h1>
<p>Select symptoms and get AI-powered disease prediction.</p>
</div>

<form method="POST" id="predictionForm" class="prediction-form">

<!-- LEFT -->
<div class="left-panel">

<div class="error-message" id="errorMessage"></div>

<div class="filter-section">
<input type="text" class="search-box" id="searchBox" placeholder="🔍 Search symptoms...">

<div class="category-filters" id="categoryFilters">
<button type="button" class="filter-btn all active">All</button>
</div>
</div>

<div class="category-accordion" id="categoryAccordion"></div>

<div class="custom-issue-section">
<h2>Additional Information</h2>
<textarea name="custom_issue" id="customIssue" placeholder="Describe any other symptoms..."></textarea>
</div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="live-box">
<div class="big-count" id="symptomCount">0</div>
<div class="mini">Symptoms Selected</div>
<div class="mini">Minimum 5 required</div>
<div class="ready-meter">
<div class="ready-fill" id="readyFill"></div>
</div>
</div>

<div class="selected-summary" id="selectedSummary">
<h3>Selected Symptoms</h3>
<div class="selected-tags" id="selectedTags"></div>
</div>

<div class="form-actions">
<button type="submit" class="btn-submit" id="submitBtn" disabled>Choose 5 Symptoms</button>
<button type="button" class="btn-reset" id="resetBtn">Clear All</button>
</div>

</div>

</form>
</div>

<div class="loading-overlay" id="loadingOverlay">
<div class="loading-content">
<div class="spinner"></div>
<h3>Analyzing Symptoms...</h3>
<p>Please wait while AI processes your data.</p>
</div>
</div>

<script>
const categoryIcons={
'Skin & Dermatological':'🧴',
'Respiratory System':'🫁',
'Digestive & Gastrointestinal':'🍽️',
'Cardiovascular & Circulatory':'❤️',
'Neurological & Mental Health':'🧠',
'Musculoskeletal System':'🦴',
'Urinary System':'💧',
'Systemic & General':'🌡️',
'Eyes & Vision':'👁️',
'Endocrine & Metabolic':'⚡',
'Liver & Hepatic':'🏥',
'Reproductive & Sexual':'👥',
'Blood & Immune System':'🩸',
'Other Medical History':'📝'
};

let selectedSymptoms=new Set();
let allCategories={};
const MIN_SYMPTOMS=5;

async function loadCategories(){
const res=await fetch('/api/symptom-categories');
const data=await res.json();
if(data.success){
allCategories=data.categories;
renderFilters();
renderAccordion();
}
}

function renderFilters(){
const wrap=document.getElementById('categoryFilters');
Object.keys(allCategories).forEach(name=>{
const b=document.createElement('button');
b.type='button';
b.className='filter-btn';
b.textContent=(categoryIcons[name]||'🏥')+' '+name;
b.onclick=()=>filterCategory(name,b);
wrap.appendChild(b);
});
}

function filterCategory(name,btn){
document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
btn.classList.add('active');

document.querySelectorAll('.category-section').forEach(sec=>{
sec.style.display=sec.dataset.category===name?'block':'none';
sec.classList.add('expanded');
});
}

function renderAccordion(){
const root=document.getElementById('categoryAccordion');
root.innerHTML='';
Object.keys(allCategories).forEach(name=>{
const symptoms=allCategories[name];

const box=document.createElement('div');
box.className='category-section';
box.dataset.category=name;

box.innerHTML=`
<div class="category-header">
<div class="category-title">
<span>${categoryIcons[name]||'🏥'}</span>
<span>${name}</span>
</div>
<div class="category-info">
<span class="category-count">${symptoms.length}</span>
<span class="toggle-icon">▼</span>
</div>
</div>
<div class="category-content">
<div class="symptoms-grid"></div>
</div>`;

box.querySelector('.category-header').onclick=()=>box.classList.toggle('expanded');

const grid=box.querySelector('.symptoms-grid');

symptoms.forEach(sym=>{
const label=document.createElement('label');
label.className='symptom-checkbox';
label.dataset.symptom=sym.value;
label.innerHTML=`
<input type="checkbox" value="${sym.value}" name="${sym.value}">
<span>${sym.label}</span>`;
label.querySelector('input').onchange=(e)=>toggleSymptom(sym.value,e.target.checked);
grid.appendChild(label);
});

root.appendChild(box);
});
}

function toggleSymptom(sym,val){
val?selectedSymptoms.add(sym):selectedSymptoms.delete(sym);
updateUI();
}

function updateUI(){
const count=selectedSymptoms.size;
document.getElementById('symptomCount').textContent=count;
document.getElementById('readyFill').style.width=Math.min((count/5)*100,100)+'%';

const btn=document.getElementById('submitBtn');
btn.disabled=count<5;
btn.textContent=count>=5?'Get AI Prediction':'Choose '+(5-count)+' More';

document.querySelectorAll('.symptom-checkbox').forEach(el=>{
const s=el.dataset.symptom;
el.classList.toggle('selected',selectedSymptoms.has(s));
});

const tags=document.getElementById('selectedTags');
tags.innerHTML='';
selectedSymptoms.forEach(sym=>{
const t=document.createElement('div');
t.className='symptom-tag';
t.innerHTML=`<span>${sym.replace(/_/g,' ')}</span><span class="remove-tag">✕</span>`;
t.querySelector('.remove-tag').onclick=()=>{
selectedSymptoms.delete(sym);
document.querySelector('input[value="'+sym+'"]').checked=false;
updateUI();
};
tags.appendChild(t);
});
}

document.getElementById('searchBox').addEventListener('input',e=>{
const q=e.target.value.toLowerCase();
document.querySelectorAll('.symptom-checkbox').forEach(el=>{
el.style.display=el.textContent.toLowerCase().includes(q)?'flex':'none';
});
});

document.getElementById('resetBtn').onclick=()=>{
selectedSymptoms.clear();
document.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false);
document.getElementById('customIssue').value='';
updateUI();
};

document.getElementById('predictionForm').addEventListener('submit',e=>{
if(selectedSymptoms.size<5){
e.preventDefault();
const err=document.getElementById('errorMessage');
err.textContent='Please select at least 5 symptoms.';
err.classList.add('active');
return;
}
document.getElementById('loadingOverlay').classList.add('active');
});

loadCategories();
</script>

</body>
</html>
