<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - TruMed</title>
<link rel="icon" href="{{ url_for('static', filename='images/dev2.png') }}">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(135deg,#fff5f5,#ffe4e6,#ffffff);
}

/* GLOW BACKGROUND */
body::before,
body::after{
    content:"";
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;
    filter:blur(90px);
    z-index:0;
    opacity:.45;
}

body::before{
    top:-100px;
    left:-100px;
    background:#fecaca;
}

body::after{
    bottom:-120px;
    right:-120px;
    background:#fda4af;
}

/* CLEAN ECG */
.heartbeat-bg{
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:280px;
    transform:translateY(-50%);
    z-index:0;
    opacity:.18;
    pointer-events:none;
}

.heartbeat-bg svg{
    width:100%;
    height:100%;
}

#ecg-line{
    fill:none;
    stroke:#ef4444;
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:2700;
    stroke-dashoffset:2700;
    animation:
        drawLine 4s linear infinite,
        lineGlow 1.2s ease-in-out infinite;
}

@keyframes drawLine{
    from{stroke-dashoffset:2700;}
    to{stroke-dashoffset:0;}
}

@keyframes lineGlow{
    0%,100%{
        filter:drop-shadow(0 0 6px rgba(239,68,68,.25));
    }
    50%{
        filter:drop-shadow(0 0 18px rgba(239,68,68,.8));
    }
}

/* BACK BUTTON */
.back-home{
    position:absolute;
    top:25px;
    left:25px;
    z-index:3;
    padding:12px 24px;
    border-radius:30px;
    text-decoration:none;
    color:#ef4444;
    background:#fff;
    border:1px solid #fecaca;
    font-weight:700;
    box-shadow:0 10px 20px rgba(239,68,68,.08);
}

/* CARD */
.signup-box{
    width:100%;
    max-width:540px;
    background:rgba(255,255,255,.96);
    border:1px solid rgba(255,255,255,.8);
    border-radius:28px;
    padding:38px;
    position:relative;
    z-index:2;
    box-shadow:0 30px 70px rgba(0,0,0,.08);
    backdrop-filter:blur(10px);
}

.logo{
    display:block;
    margin:0 auto 15px;
    height:62px;
}

h1{
    text-align:center;
    font-size:34px;
    color:#111827;
    margin-bottom:8px;
}

.sub{
    text-align:center;
    color:#6b7280;
    margin-bottom:28px;
    font-size:15px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#374151;
}

input{
    width:100%;
    height:52px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:0 16px;
    font-size:15px;
    outline:none;
    transition:.25s;
}

input:focus{
    border-color:#ef4444;
    box-shadow:0 0 0 4px rgba(239,68,68,.08);
}

button{
    width:100%;
    height:54px;
    border:none;
    border-radius:14px;
    background:#ef4444;
    color:#fff;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    margin-top:8px;
    transition:.25s;
}

button:hover{
    background:#dc2626;
    transform:translateY(-2px);
}

.divider{
    text-align:center;
    color:#9ca3af;
    font-size:13px;
    margin:18px 0;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:38%;
    height:1px;
    background:#e5e7eb;
}

.divider::before{left:0;}
.divider::after{right:0;}

.google{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    height:52px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    text-decoration:none;
    color:#111827;
    font-weight:700;
    background:#fff;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#6b7280;
    font-size:14px;
}

.footer a{
    color:#ef4444;
    text-decoration:none;
    font-weight:800;
}

/* MOBILE */
@media(max-width:650px){

body{
    padding:18px;
    overflow:auto;
}

.signup-box{
    padding:28px 20px;
}

.row{
    grid-template-columns:1fr;
    gap:0;
}

.back-home{
    top:12px;
    left:12px;
    padding:10px 16px;
    font-size:14px;
}

h1{
    font-size:28px;
}

}
</style>
</head>
<body>

<a href="{{ url_for('landing') }}" class="back-home">← Back to Home</a>

<!-- ECG -->
<div class="heartbeat-bg">

<svg viewBox="0 0 1440 300" preserveAspectRatio="none">

<path id="ecg-line" d="
M0 150
L80 150
L120 150
L150 135
L170 165
L190 150

L260 150
L280 150
L300 100
L320 225
L350 65
L380 150

L470 150
L500 140
L520 160
L540 150

L620 150
L650 150
L670 110
L690 215
L720 70
L750 150

L860 150
L890 145
L910 155
L930 150

L1030 150
L1060 150
L1080 105
L1100 220
L1130 68
L1160 150

L1440 150
"></path>

</svg>

</div>

<div class="signup-box">

<img src="{{ url_for('static', filename='images/dev2.png') }}" class="logo">

<h1>Create Your Account</h1>
<p class="sub">Start your healthcare journey with AI-powered insights</p>

<form method="POST" action="{{ url_for('signup') }}">

<div class="group">
<label>Full Name</label>
<input type="text" name="name" placeholder="John Doe" required>
</div>

<div class="row">

<div class="group">
<label>Email Address</label>
<input type="email" name="email" placeholder="you@example.com" required>
</div>

<div class="group">
<label>Phone Number</label>
<input type="text" name="phone" placeholder="+91 9876543210" required>
</div>

</div>

<div class="row">

<div class="group">
<label>Password</label>
<input type="password" name="password" placeholder="Minimum 6 characters" required>
</div>

<div class="group">
<label>Confirm Password</label>
<input type="password" name="confirm_password" placeholder="Re-enter password" required>
</div>

</div>

<button type="submit">Create Account</button>

<div class="divider">OR CONTINUE WITH</div>

<a href="{{ url_for('google_login') }}" class="google">
🔍 Sign up with Google
</a>

<div class="footer">
Already have an account?
<a href="{{ url_for('login') }}">Login here</a>
</div>

</form>

</div>

</body>
</html>
